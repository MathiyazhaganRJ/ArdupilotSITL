<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shark Hawk - Cesium 3D Terrain</title>
    
    <!-- Load CesiumJS from CDN -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.106/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.106/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100%; }
        #telemetryOverlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            border: 1px solid #00ff00;
        }
        #cameraControls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            background: #222;
            color: #fff;
            border: 1px solid #00ff00;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
        }
        button:hover { background: #00ff00; color: #000; }
        .active-btn { background: #00ff00; color: #000; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="telemetryOverlay">Waiting for SITL Telemetry...</div>
    <div id="cameraControls">
        <button id="btnFollow" class="active-btn" onclick="setCameraMode('follow')">FOLLOW PLANE</button>
        <button id="btnFree" onclick="setCameraMode('free')">FREE CAMERA</button>
    </div>

    <script>
        // =======================================================
        // INSERT YOUR CESIUM ION TOKEN HERE (If you have one)
        // If left empty, it will use the default evaluation token
        // =======================================================
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4NTc5NWQ2Yy1lYWE3LTQ1OWQtOTY5Ny0xOGVmZmNiY2YzNjAiLCJpZCI6NDQ2ODYzLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODE5NTAxNTJ9.JtfASsFfn58fvA0pTntiGdSorfIa57daBrrkar3Td1k';

        // Initialize the Cesium Viewer with 3D Terrain
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            navigationHelpButton: false,
            sceneModePicker: false,
            animation: false, // Removes the play/pause button
            timeline: false   // Removes the timeline at the bottom
        });

        // Enable Lighting (sunlight) and Depth Testing
        viewer.scene.globe.enableLighting = true;
        // Disabled depth test so the track never clips into the ground or fades away
        viewer.scene.globe.depthTestAgainstTerrain = false;

        // Create the Plane Entity (A glowing dot)
        const planeEntity = viewer.entities.add({
            name: 'Shark Hawk',
            position: new Cesium.CallbackProperty(() => currentCartesianPos, false),
            orientation: new Cesium.CallbackProperty(() => currentQuatOrientation, false),
            point: {
                pixelSize: 15,
                color: Cesium.Color.LIME,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 2
            }
        });

        // Create the 3D Flight Track (Trail)
        const pathPositions = [];
        const pathEntity = viewer.entities.add({
            name: 'Flight Track',
            polyline: {
                positions: new Cesium.CallbackProperty(() => pathPositions, false),
                width: 1.5,
                material: Cesium.Color.LIME
            }
        });

        // Set the camera to follow the plane by default
        viewer.trackedEntity = planeEntity;

        // Camera Mode Toggle Function
        function setCameraMode(mode) {
            if (mode === 'follow') {
                viewer.trackedEntity = planeEntity;
                document.getElementById('btnFollow').classList.add('active-btn');
                document.getElementById('btnFree').classList.remove('active-btn');
            } else {
                viewer.trackedEntity = undefined;
                document.getElementById('btnFree').classList.add('active-btn');
                document.getElementById('btnFollow').classList.remove('active-btn');
            }
        }

        // Variables to store latest telemetry
        let targetLat = 0, targetLon = 0, targetAlt = 0;
        let interLat = 0, interLon = 0, interAlt = 0;
        let smoothLat = 0, smoothLon = 0, smoothAlt = 0;
        
        let targetRoll = 0, targetPitch = 0, targetYaw = 0;
        let interRoll = 0, interPitch = 0, interYaw = 0;
        let smoothRoll = 0, smoothPitch = 0, smoothYaw = 0;
        
        let hasHome = false;
        let lastRenderTime = Date.now();
        let lastTrailAddPos = new Cesium.Cartesian3();

        // Globals for CallbackProperty
        let currentCartesianPos = Cesium.Cartesian3.fromDegrees(0, 0, 0);
        let currentQuatOrientation = Cesium.Quaternion.IDENTITY;

        // High-Frame-Rate Smooth Interpolation (Lerp)
        viewer.scene.preUpdate.addEventListener(function(scene, time) {
            if (!hasHome) return;
            const now = Date.now();
            const dt = Math.min((now - lastRenderTime) / 1000.0, 0.1);
            lastRenderTime = now;
            
            // True 2nd-Order Low-Pass Filter (Cascaded 1st-Order)
            // This guarantees C1 continuity (smooth velocity) to completely erase 10Hz stepping
            const lerp = 1.0 - Math.exp(-dt * 3.0);
            
            interLat += (targetLat - interLat) * lerp;
            smoothLat += (interLat - smoothLat) * lerp;
            
            interLon += (targetLon - interLon) * lerp;
            smoothLon += (interLon - smoothLon) * lerp;
            
            interAlt += (targetAlt - interAlt) * lerp;
            smoothAlt += (interAlt - smoothAlt) * lerp;
            
            interRoll += (targetRoll - interRoll) * lerp;
            smoothRoll += (interRoll - smoothRoll) * lerp;
            
            interPitch += (targetPitch - interPitch) * lerp;
            smoothPitch += (interPitch - smoothPitch) * lerp;
            
            // Prevent 360-degree spin when yaw wraps from -PI to PI
            let dyaw1 = targetYaw - interYaw;
            while (dyaw1 > Math.PI) dyaw1 -= 2*Math.PI;
            while (dyaw1 < -Math.PI) dyaw1 += 2*Math.PI;
            interYaw += dyaw1 * lerp;
            
            let dyaw2 = interYaw - smoothYaw;
            while (dyaw2 > Math.PI) dyaw2 -= 2*Math.PI;
            while (dyaw2 < -Math.PI) dyaw2 += 2*Math.PI;
            smoothYaw += dyaw2 * lerp;

            // Apply Smooth Position
            currentCartesianPos = Cesium.Cartesian3.fromDegrees(smoothLon, smoothLat, smoothAlt);

            // Apply Smooth Orientation
            const hpr = new Cesium.HeadingPitchRoll(smoothYaw - Math.PI/2, smoothPitch, smoothRoll);
            currentQuatOrientation = Cesium.Transforms.headingPitchRollQuaternion(currentCartesianPos, hpr);

            // Add to 3D Track history only if we moved more than 1 meter
            if (Cesium.Cartesian3.distance(currentCartesianPos, lastTrailAddPos) > 1.0) {
                pathPositions.push(currentCartesianPos);
                // Keep up to 10,000 points (roughly 10 kilometers of flight path) so it doesn't fade!
                if (pathPositions.length > 10000) pathPositions.shift();
                lastTrailAddPos = currentCartesianPos;
            }
        });

        // =======================================================
        // WEBSOCKET CONNECTION TO PYTHON SERVER
        // =======================================================
        const ws = new WebSocket('ws://localhost:8766');

        ws.onopen = () => {
            console.log("Connected to Python Telemetry Server!");
            document.getElementById('telemetryOverlay').innerText = "Connected! Waiting for GPS...";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'GLOBAL_POSITION_INT') {
                targetLat = data.lat;
                targetLon = data.lon;
                targetAlt = data.alt / 1000.0; // Convert mm to meters

                if (!hasHome) {
                    interLat = targetLat;
                    smoothLat = targetLat;
                    
                    interLon = targetLon;
                    smoothLon = targetLon;
                    
                    interAlt = targetAlt;
                    smoothAlt = targetAlt;
                    
                    hasHome = true;
                    // Zoom camera out slightly when first connecting
                    setTimeout(() => {
                        viewer.zoomTo(planeEntity, new Cesium.HeadingPitchRange(0, -Cesium.Math.PI_OVER_FOUR, 500));
                    }, 500);
                }

            } else if (data.type === 'ATTITUDE') {
                targetRoll = data.roll;
                targetPitch = data.pitch;
                targetYaw = data.yaw;
                
                if (!hasHome) {
                    interRoll = targetRoll;
                    smoothRoll = targetRoll;
                    
                    interPitch = targetPitch;
                    smoothPitch = targetPitch;
                    
                    interYaw = targetYaw;
                    smoothYaw = targetYaw;
                }

                // Update Overlay Text
                document.getElementById('telemetryOverlay').innerText = 
                    `TERRAIN MAP\n------------------\n` +
                    `Alt (MSL): ${smoothAlt.toFixed(1)} m\n` +
                    `Lat      : ${smoothLat.toFixed(5)}\n` +
                    `Lon      : ${smoothLon.toFixed(5)}\n` +
                    `Pitch    : ${(smoothPitch * 180 / Math.PI).toFixed(1)}°\n` +
                    `Roll     : ${(smoothRoll * 180 / Math.PI).toFixed(1)}°`;
            }
        };

        ws.onclose = () => {
            document.getElementById('telemetryOverlay').innerText = "Disconnected from Server.";
            document.getElementById('telemetryOverlay').style.color = "red";
        };
    </script>
</body>
</html>
