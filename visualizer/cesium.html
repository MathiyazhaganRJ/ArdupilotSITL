<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shark Hawk - Cesium 3D Terrain</title>
    
    <!-- Load CesiumJS from CDN -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.106/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.106/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100%; }
        #telemetryOverlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="telemetryOverlay">Waiting for SITL Telemetry...</div>

    <script>
        // =======================================================
        // INSERT YOUR CESIUM ION TOKEN HERE (If you have one)
        // If left empty, it will use the default evaluation token
        // =======================================================
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4NTc5NWQ2Yy1lYWE3LTQ1OWQtOTY5Ny0xOGVmZmNiY2YzNjAiLCJpZCI6NDQ2ODYzLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODE5NTAxNTJ9.JtfASsFfn58fvA0pTntiGdSorfIa57daBrrkar3Td1k';

        // Initialize the Cesium Viewer with 3D Terrain
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            navigationHelpButton: false,
            sceneModePicker: false
        });

        // Enable Lighting (sunlight) and Depth Testing (so the plane hides behind mountains)
        viewer.scene.globe.enableLighting = true;
        viewer.scene.globe.depthTestAgainstTerrain = true;

        // Create the Plane Entity (A glowing dot)
        const planeEntity = viewer.entities.add({
            name: 'Shark Hawk',
            position: Cesium.Cartesian3.fromDegrees(0, 0, 0),
            orientation: Cesium.Transforms.headingPitchRollQuaternion(
                Cesium.Cartesian3.fromDegrees(0, 0, 0),
                new Cesium.HeadingPitchRoll(0, 0, 0)
            ),
            point: {
                pixelSize: 15,
                color: Cesium.Color.LIME,
                outlineColor: Cesium.Color.BLACK,
                outlineWidth: 2
            }
        });

        // Create the 3D Flight Track (Trail)
        const pathPositions = [];
        const pathEntity = viewer.entities.add({
            name: 'Flight Track',
            polyline: {
                positions: new Cesium.CallbackProperty(() => pathPositions, false),
                width: 5,
                material: new Cesium.PolylineGlowMaterialProperty({
                    glowPower: 0.2,
                    color: Cesium.Color.CYAN
                })
            }
        });

        // Set the camera to follow the plane
        viewer.trackedEntity = planeEntity;

        // Variables to store latest telemetry
        let currentLat = 0, currentLon = 0, currentAltMSL = 0;
        let currentRoll = 0, currentPitch = 0, currentYaw = 0;
        let hasHome = false;

        // =======================================================
        // WEBSOCKET CONNECTION TO PYTHON SERVER
        // =======================================================
        const ws = new WebSocket('ws://localhost:8766');

        ws.onopen = () => {
            console.log("Connected to Python Telemetry Server!");
            document.getElementById('telemetryOverlay').innerText = "Connected! Waiting for GPS...";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'GLOBAL_POSITION_INT') {
                currentLat = data.lat;
                currentLon = data.lon;
                currentAltMSL = data.alt / 1000.0; // Convert mm to meters

                // Update the Position
                const position = Cesium.Cartesian3.fromDegrees(currentLon, currentLat, currentAltMSL);
                planeEntity.position = position;

                // Add to 3D Track history
                if (hasHome) { // Only start drawing after we have a valid home
                    pathPositions.push(position);
                    if (pathPositions.length > 500) { // Keep roughly 100 seconds of history at 5Hz
                        pathPositions.shift();
                    }
                }

                if (!hasHome) {
                    hasHome = true;
                    // Zoom camera out slightly when first connecting
                    viewer.zoomTo(planeEntity, new Cesium.HeadingPitchRange(0, -Cesium.Math.PI_OVER_FOUR, 500));
                }

            } else if (data.type === 'ATTITUDE') {
                currentRoll = data.roll;
                currentPitch = data.pitch;
                currentYaw = data.yaw;

                // Update the Orientation
                if (hasHome) {
                    const position = Cesium.Cartesian3.fromDegrees(currentLon, currentLat, currentAltMSL);
                    const hpr = new Cesium.HeadingPitchRoll(currentYaw - Math.PI/2, currentPitch, currentRoll);
                    const orientation = Cesium.Transforms.headingPitchRollQuaternion(position, hpr);
                    planeEntity.orientation = orientation;
                }

                // Update Overlay Text
                document.getElementById('telemetryOverlay').innerText = 
                    `SHARK HAWK TELEMETRY\n------------------\n` +
                    `Alt (MSL): ${currentAltMSL.toFixed(1)} m\n` +
                    `Lat      : ${currentLat.toFixed(5)}\n` +
                    `Lon      : ${currentLon.toFixed(5)}\n` +
                    `Pitch    : ${(currentPitch * 180 / Math.PI).toFixed(1)}°\n` +
                    `Roll     : ${(currentRoll * 180 / Math.PI).toFixed(1)}°`;
            }
        };

        ws.onclose = () => {
            document.getElementById('telemetryOverlay').innerText = "Disconnected from Server.";
            document.getElementById('telemetryOverlay').style.color = "red";
        };
    </script>
</body>
</html>
