<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VTOL Visualizer</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --accent: #0071e3;
            --motor-bg: #e5e5ea;
            --btn-bg: rgba(0,0,0,0.05);
            --btn-hover: rgba(0,0,0,0.1);
            --danger: #ff3b30;
            --success: #34c759;
            --option-bg: #ffffff;
            --option-text: #000000;
        }

        body.dark-mode {
            --bg-color: #000000;
            --panel-bg: rgba(28, 28, 30, 0.75);
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --border-color: rgba(255, 255, 255, 0.15);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            --accent: #0a84ff;
            --motor-bg: #3a3a3c;
            --btn-bg: rgba(255,255,255,0.1);
            --btn-hover: rgba(255,255,255,0.15);
            --danger: #ff453a;
            --success: #30d158;
            --option-bg: #1c1c1e;
            --option-text: #ffffff;
        }

        body { 
            margin: 0; overflow: hidden; 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s ease;
        }
        
        #canvas-container { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 260px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            box-shadow: var(--shadow);
            z-index: 10;
            transition: all 0.3s ease;
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h3 { margin: 0; font-weight: 600; font-size: 18px; letter-spacing: -0.02em; }
        
        .icon-btn { 
            background: var(--btn-bg); border: none; border-radius: 50%; width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            font-size: 14px; transition: background 0.2s; color: var(--text-primary);
        }
        .icon-btn:hover { background: var(--btn-hover); }

        .data-card { 
            background: var(--btn-bg); border-radius: 12px; padding: 12px; margin-bottom: 16px;
        }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .data-row:last-child { margin-bottom: 0; }
        .data-label { color: var(--text-secondary); font-weight: 500; }
        .data-val { font-weight: 600; font-variant-numeric: tabular-nums; }
        
        .section-title { font-weight: 600; font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin: 20px 0 10px 0; }
        
        select { 
            background: var(--btn-bg); color: var(--text-primary); border: 1px solid var(--border-color); 
            border-radius: 6px; padding: 4px; font-family: inherit; font-size: 12px; font-weight: 500; outline: none; width: 100px;
        }
        option {
            background-color: var(--option-bg);
            color: var(--option-text);
        }
        
        .map-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 500;}
        
        .motor-bar-container { display: flex; justify-content: space-between; height: 85px; margin-top: 10px; }
        .motor-bar-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .pwm-label { font-size: 9px; color: var(--text-secondary); font-weight: 700; }
        .motor-bar-bg { width: 14px; height: 50px; background: var(--motor-bg); border-radius: 7px; overflow: hidden; position: relative; }
        .motor-bar-fill { width: 100%; position: absolute; bottom: 0; background: var(--success); transition: height 0.1s, background 0.2s; border-radius: 7px; }
        .motor-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 20px; background: var(--btn-bg); padding: 4px; border-radius: 10px;}
        .mode-btn { 
            flex: 1; padding: 6px 0; border: none; border-radius: 6px; cursor: pointer;
            font-family: inherit; font-weight: 600; font-size: 13px; transition: all 0.2s;
            background: transparent; color: var(--text-secondary);
        }
        .btn-active { background: var(--panel-bg); color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body class="dark-mode">
    <div id="ui-panel">
        <div class="header">
            <h2>ArduPilot SITL</h2>
            <button id="theme-toggle" class="icon-btn">☀️</button>
        </div>

        <div class="data-card">
            <div class="data-row"><span class="data-label">Link Status</span><span id="status" class="data-val" style="color: var(--danger);">Offline</span></div>
            <div class="data-row"><span class="data-label">Firmware</span><span id="firmware" class="data-val" style="color: var(--text-secondary);">---</span></div>
            <div class="data-row"><span class="data-label">Flight Mode</span><span id="f_mode" class="data-val" style="color: var(--accent);">UNKNOWN</span></div>
            <div class="data-row"><span class="data-label">Altitude</span><span id="alt" class="data-val">0.0 m</span></div>
            <div class="data-row"><span class="data-label">Airspeed</span><span id="a_spd" class="data-val">0.0 m/s</span></div>
            <div class="data-row"><span class="data-label">Ground Spd</span><span id="g_spd" class="data-val">0.0 m/s</span></div>
        </div>
        
        <div class="section-title">Vehicle Config</div>
        <select id="v_type" style="width: 100%; margin-bottom: 20px; padding: 6px 10px;">
            <option value="vtol">QuadPlane (VTOL)</option>
            <option value="plane">Fixed Wing (Pusher)</option>
            <option value="twin">Twin Engine (Fixed Wing)</option>
            <option value="quad">Quadcopter</option>
        </select>

        <div class="data-card">
            <h3 style="margin: 0 0 10px 0; font-size: 14px;">Motor Mapping</h3>
            <div id="map-vtol">
                <div class="map-row">Motor 1 (FR) <select id="m_fr"></select></div>
                <div class="map-row">Motor 2 (BL) <select id="m_bl"></select></div>
                <div class="map-row">Motor 3 (FL) <select id="m_fl"></select></div>
                <div class="map-row">Motor 4 (BR) <select id="m_br"></select></div>
            </div>
            <div id="map-single" class="map-row">Cruise <select id="m_push"></select></div>
            <div id="map-twin" style="display: none;">
                <div class="map-row">Left Cruise <select id="m_twin_l"></select></div>
                <div class="map-row">Right Cruise <select id="m_twin_r"></select></div>
            </div>
        </div>

        <div class="section-title">Motors</div>
        <div class="motor-bar-container" id="motor-bars"></div>
        
        <div style="margin-top: 30px; text-align: center; font-size: 11px; color: var(--text-secondary); opacity: 0.6; font-weight: 600; letter-spacing: 1px;">
            Designed by RJ
        </div>
        
        <div class="btn-group">
            <button id="btn-follow" class="mode-btn btn-active">Follow</button>
            <button id="btn-free" class="mode-btn">Free</button>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.onclick = () => {
            const isDark = document.body.classList.contains('dark-mode');
            if (isDark) {
                document.body.classList.remove('dark-mode');
                themeToggle.innerText = '🌙';
            } else {
                document.body.classList.add('dark-mode');
                themeToggle.innerText = '☀️';
            }
            updateSceneTheme();
        };

        const scene = new THREE.Scene();
        let gridHelper;
        
        function updateSceneTheme() {
            const isDark = document.body.classList.contains('dark-mode');
            const bgHex = isDark ? 0x000000 : 0xf5f5f7;
            const grid1 = isDark ? 0x333336 : 0xd2d2d7;
            const grid2 = isDark ? 0x1c1c1e : 0xe5e5ea;

            scene.background = new THREE.Color(bgHex);
            scene.fog = new THREE.Fog(bgHex, 20, 200);

            if(gridHelper) scene.remove(gridHelper);
            gridHelper = new THREE.GridHelper(200, 200, grid1, grid2);
            gridHelper.position.y = -1;
            scene.add(gridHelper);
        }
        updateSceneTheme();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const vtolGroup = new THREE.Group();
        vtolGroup.rotation.order = 'YXZ';
        scene.add(vtolGroup);

        const matBody = new THREE.MeshPhongMaterial({ color: 0x0071e3 });
        const matCarbon = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const matProp = new THREE.MeshBasicMaterial({ color: 0xff9500, transparent: true, opacity: 0.8 });

        const aeroGroup = new THREE.Group();
        vtolGroup.add(aeroGroup);

        const loader = new THREE.GLTFLoader();
        loader.load('models/Endurance.glb', function(gltf) {
            const model = gltf.scene;
            model.rotation.y = -Math.PI / 2; // Rotate -90deg so nose points forward (-Z)
            model.traverse(function(child) {
                if(child.isMesh) {
                    child.geometry.computeVertexNormals(); // Fixes black model!
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xff5500, // Vibrant Orange
                        roughness: 0.4,
                        metalness: 0.3,
                        side: THREE.DoubleSide
                    });
                }
            });
            aeroGroup.add(model);
        }, undefined, function(error) {
            console.error('Error loading Endurance.glb:', error);
        });

        // Better looking propeller
        const pusherProp = new THREE.Group();
        pusherProp.add(new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.02, 0.01), new THREE.MeshBasicMaterial({color: 0x34c759})));
        pusherProp.add(new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.3, 0.01), new THREE.MeshBasicMaterial({color: 0x34c759})));
        pusherProp.position.set(0, 0, 0.45); // Tail position for 0.9m length plane
        vtolGroup.add(pusherProp);

        const quadGroup = new THREE.Group();
        vtolGroup.add(quadGroup);

        const twinGroup = new THREE.Group();
        vtolGroup.add(twinGroup);
        twinGroup.visible = false;

        const twinMotorL = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.3), matCarbon);
        twinMotorL.rotation.x = Math.PI / 2;
        twinMotorL.position.set(-0.4, 0.05, -0.15);
        twinGroup.add(twinMotorL);
        const twinPropL = new THREE.Group();
        twinPropL.add(new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.02, 0.01), new THREE.MeshBasicMaterial({color: 0x34c759})));
        twinPropL.add(new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.25, 0.01), new THREE.MeshBasicMaterial({color: 0x34c759})));
        twinPropL.position.set(-0.4, 0.05, -0.3);
        twinGroup.add(twinPropL);

        const twinMotorR = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.3), matCarbon);
        twinMotorR.rotation.x = Math.PI / 2;
        twinMotorR.position.set(0.4, 0.05, -0.15);
        twinGroup.add(twinMotorR);
        const twinPropR = new THREE.Group();
        twinPropR.add(new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.02, 0.01), new THREE.MeshBasicMaterial({color: 0x34c759})));
        twinPropR.add(new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.25, 0.01), new THREE.MeshBasicMaterial({color: 0x34c759})));
        twinPropR.position.set(0.4, 0.05, -0.3);
        twinGroup.add(twinPropR);

        const props = [];
        const armPositions = [
            { x: 0.5, z: -0.35 }, { x: -0.5, z: 0.35 }, { x: 0.5, z: 0.35 }, { x: -0.5, z: -0.35 }
        ];

        armPositions.forEach(pos => {
            const boom = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.75), matCarbon);
            boom.rotation.x = Math.PI / 2;
            boom.position.set(pos.x, 0.05, 0);
            quadGroup.add(boom);
            
            const motor = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.06), matCarbon);
            motor.position.set(pos.x, 0.08, pos.z);
            quadGroup.add(motor);

            // Better looking VTOL prop (cross)
            const prop = new THREE.Group();
            prop.add(new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.01, 0.02), matProp));
            prop.add(new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.01, 0.3), matProp));
            prop.position.set(pos.x, 0.11, pos.z);
            quadGroup.add(prop);
            props.push(prop);
        });

        document.getElementById('v_type').onchange = (e) => {
            const type = e.target.value;
            aeroGroup.visible = (type === 'vtol' || type === 'plane' || type === 'twin');
            quadGroup.visible = (type === 'vtol' || type === 'quad');
            pusherProp.visible = (type === 'vtol' || type === 'plane');
            twinGroup.visible = (type === 'twin');

            document.getElementById('map-vtol').style.display = (type === 'vtol') ? 'block' : 'none';
            document.getElementById('map-single').style.display = (type === 'vtol' || type === 'plane') ? 'flex' : 'none';
            document.getElementById('map-twin').style.display = (type === 'twin') ? 'block' : 'none';
            
            if(type === 'quad') {
                if(!quadGroup.hub) {
                    const hub = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.3), matCarbon);
                    hub.position.set(0, 0.05, -0.1);
                    quadGroup.add(hub);
                    quadGroup.hub = hub;
                }
                quadGroup.hub.visible = true;
            } else if(quadGroup.hub) {
                quadGroup.hub.visible = false;
            }
        };
        
        const selects = ['m_fr', 'm_bl', 'm_br', 'm_fl', 'm_push', 'm_twin_l', 'm_twin_r'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            for(let i=1; i<=8; i++) {
                const opt = document.createElement('option');
                opt.value = i-1; opt.innerText = "CH" + i;
                el.appendChild(opt);
            }
        });
        document.getElementById('m_fr').value = 4;
        document.getElementById('m_bl').value = 5;
        document.getElementById('m_br').value = 6;
        document.getElementById('m_fl').value = 7;
        document.getElementById('m_push').value = 2;
        document.getElementById('m_twin_l').value = 2;
        document.getElementById('m_twin_r').value = 3;

        const maxTrailPoints = 2000;
        const trailPositions = new Float32Array(maxTrailPoints * 3);
        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        const trailMat = new THREE.LineBasicMaterial({ color: 0x34c759, linewidth: 2 });
        const trailLine = new THREE.Line(trailGeo, trailMat);
        trailLine.frustumCulled = false;
        scene.add(trailLine);
        let trailCount = 0;

        const motorBarsContainer = document.getElementById('motor-bars');
        const uiFills = [], uiPwms = [];
        for(let i=0; i<8; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'motor-bar-wrapper';
            const pwmVal = document.createElement('div'); pwmVal.className = 'pwm-label'; pwmVal.innerText = '1000';
            const bg = document.createElement('div'); bg.className = 'motor-bar-bg';
            const fill = document.createElement('div'); fill.className = 'motor-bar-fill'; fill.style.height = '0%';
            bg.appendChild(fill);
            const lbl = document.createElement('div'); lbl.innerText = i+1; lbl.className = 'motor-label';
            wrapper.appendChild(pwmVal); wrapper.appendChild(bg); wrapper.appendChild(lbl);
            motorBarsContainer.appendChild(wrapper);
            uiFills.push(fill); uiPwms.push(pwmVal);
        }

        let cameraMode = 'follow', lastPlanePos = new THREE.Vector3(), lastTrailAddPos = new THREE.Vector3();
        document.getElementById('btn-follow').onclick = () => { cameraMode = 'follow'; document.getElementById('btn-follow').classList.add('btn-active'); document.getElementById('btn-free').classList.remove('btn-active'); };
        document.getElementById('btn-free').onclick = () => { cameraMode = 'free'; document.getElementById('btn-free').classList.add('btn-active'); document.getElementById('btn-follow').classList.remove('btn-active'); };

        const ws = new WebSocket('ws://127.0.0.1:8766');
        let servoSpeeds = [0,0,0,0,0,0,0,0];
        let targetPos = new THREE.Vector3(), targetRot = new THREE.Euler(0, 0, 0, 'YXZ');
        let firstPos = false;

        ws.onopen = () => {
            document.getElementById('status').innerText = "Connected";
            document.getElementById('status').style.color = "var(--success)";
        };
        ws.onclose = () => {
            document.getElementById('status').innerText = "Offline";
            document.getElementById('status').style.color = "var(--danger)";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'HEARTBEAT') {
                if(data.mode) document.getElementById('f_mode').innerText = data.mode;
                if(data.firmware) document.getElementById('firmware').innerText = data.firmware;
            } else if (data.type === 'VFR_HUD') {
                document.getElementById('a_spd').innerText = data.airspeed.toFixed(1) + " m/s";
                document.getElementById('g_spd').innerText = data.groundspeed.toFixed(1) + " m/s";
            } else if (data.type === 'ATTITUDE') targetRot.set(data.pitch, -data.yaw, -data.roll);
            else if (data.type === 'LOCAL_POSITION_NED') { 
                document.getElementById('alt').innerText = data.z.toFixed(1) + " m"; 
                targetPos.set(data.y, data.z, -data.x); 
                if(!firstPos) {
                    vtolGroup.position.copy(targetPos);
                    lastPlanePos.copy(targetPos);
                    lastTrailAddPos.copy(targetPos);
                    firstPos = true;
                }
            }
            else if (data.type === 'SERVO_OUTPUT_RAW') {
                servoSpeeds = data.servos;
                for(let i=0; i<8; i++) {
                    let pwm = servoSpeeds[i]; uiPwms[i].innerText = pwm;
                    let percent = Math.max(0, Math.min(100, ((pwm - 1000) / 1000) * 100));
                    uiFills[i].style.height = percent + '%';
                    uiFills[i].style.background = (percent > 80) ? 'var(--danger)' : (percent > 10 ? 'var(--success)' : 'transparent');
                }
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            vtolGroup.position.lerp(targetPos, 0.05);
            let q = new THREE.Quaternion().setFromEuler(vtolGroup.rotation).slerp(new THREE.Quaternion().setFromEuler(targetRot), 0.05);
            vtolGroup.setRotationFromQuaternion(q);
            
            if (cameraMode === 'follow') {
                const offset = camera.position.clone().sub(controls.target);
                controls.target.copy(vtolGroup.position);
                camera.position.copy(controls.target).add(offset);
            }
            controls.update();
            lastPlanePos.copy(vtolGroup.position);

            if (vtolGroup.position.distanceTo(lastTrailAddPos) > 0.5) {
                if(trailCount < maxTrailPoints) {
                    trailPositions[trailCount * 3] = vtolGroup.position.x; trailPositions[trailCount * 3 + 1] = vtolGroup.position.y; trailPositions[trailCount * 3 + 2] = vtolGroup.position.z;
                    trailCount++; trailGeo.setDrawRange(0, trailCount);
                } else {
                    trailPositions.copyWithin(0, 3);
                    trailPositions[(maxTrailPoints-1)*3] = vtolGroup.position.x; trailPositions[(maxTrailPoints-1)*3+1] = vtolGroup.position.y; trailPositions[(maxTrailPoints-1)*3+2] = vtolGroup.position.z;
                }
                trailGeo.attributes.position.needsUpdate = true;
                lastTrailAddPos.copy(vtolGroup.position);
            }
            
            let m_fr = parseInt(document.getElementById('m_fr').value), m_bl = parseInt(document.getElementById('m_bl').value),
                m_br = parseInt(document.getElementById('m_br').value), m_fl = parseInt(document.getElementById('m_fl').value),
                m_push = parseInt(document.getElementById('m_push').value), m_tl = parseInt(document.getElementById('m_twin_l').value),
                m_tr = parseInt(document.getElementById('m_twin_r').value);

            // Use 0.47 instead of 2.0 to avoid stroboscopic "freezing" effect
            props[0].rotation.y += Math.max(0, (servoSpeeds[m_fr] - 1000) / 1000) * 0.47;
            props[1].rotation.y += Math.max(0, (servoSpeeds[m_bl] - 1000) / 1000) * 0.47;
            props[2].rotation.y += Math.max(0, (servoSpeeds[m_br] - 1000) / 1000) * 0.47;
            props[3].rotation.y += Math.max(0, (servoSpeeds[m_fl] - 1000) / 1000) * 0.47;
            pusherProp.rotation.z += Math.max(0, (servoSpeeds[m_push] - 1000) / 1000) * 0.47;
            twinPropL.rotation.z += Math.max(0, (servoSpeeds[m_tl] - 1000) / 1000) * 0.47;
            twinPropR.rotation.z += Math.max(0, (servoSpeeds[m_tr] - 1000) / 1000) * 0.47;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
