<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VTOL Visualizer</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --accent: #0071e3;
            --motor-bg: #e5e5ea;
            --btn-bg: rgba(0, 0, 0, 0.05);
            --btn-hover: rgba(0, 0, 0, 0.1);
            --danger: #ff3b30;
            --success: #34c759;
            --option-bg: #ffffff;
            --option-text: #000000;
        }

        body.dark-mode {
            --bg-color: #000000;
            --panel-bg: rgba(28, 28, 30, 0.75);
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --border-color: rgba(255, 255, 255, 0.15);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            --accent: #0a84ff;
            --motor-bg: #3a3a3c;
            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-hover: rgba(255, 255, 255, 0.15);
            --danger: #ff453a;
            --success: #30d158;
            --option-bg: #1c1c1e;
            --option-text: #ffffff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s ease;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 260px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            box-shadow: var(--shadow);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h3 {
            margin: 0;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.02em;
        }

        .icon-btn {
            background: var(--btn-bg);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            color: var(--text-primary);
        }

        .icon-btn:hover {
            background: var(--btn-hover);
        }

        .data-card {
            background: var(--btn-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .data-row:last-child {
            margin-bottom: 0;
        }

        .data-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .data-val {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .section-title {
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 20px 0 10px 0;
        }

        select {
            background: var(--btn-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            outline: none;
            width: 100px;
        }

        option {
            background-color: var(--option-bg);
            color: var(--option-text);
        }

        .map-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .motor-bar-container {
            display: flex;
            justify-content: space-between;
            height: 85px;
            margin-top: 10px;
        }

        .motor-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .pwm-label {
            font-size: 9px;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .motor-bar-bg {
            width: 14px;
            height: 50px;
            background: var(--motor-bg);
            border-radius: 7px;
            overflow: hidden;
            position: relative;
        }

        .motor-bar-fill {
            width: 100%;
            position: absolute;
            bottom: 0;
            background: var(--success);
            transition: height 0.1s, background 0.2s;
            border-radius: 7px;
        }

        .motor-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            background: var(--btn-bg);
            padding: 4px;
            border-radius: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 6px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-active {
            background: var(--panel-bg);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>
    <div id="ui-panel">
        <div class="header">
            <h2>ArduPilot SITL</h2>
            <button id="theme-toggle" class="icon-btn">🌙</button>
        </div>

        <div class="data-card">
            <div class="data-row"><span class="data-label">Link Status</span><span id="status" class="data-val"
                    style="color: var(--danger);">Offline</span></div>
            <div class="data-row"><span class="data-label">Firmware</span><span id="firmware" class="data-val"
                    style="color: var(--text-secondary);">---</span></div>
            <div class="data-row"><span class="data-label">Flight Mode</span><span id="f_mode" class="data-val"
                    style="color: var(--accent);">UNKNOWN</span></div>
            <div class="data-row"><span class="data-label">Altitude</span><span id="alt" class="data-val">0.0 m</span>
            </div>
            <div class="data-row"><span class="data-label">Airspeed</span><span id="a_spd" class="data-val">0.0
                    m/s</span></div>
            <div class="data-row"><span class="data-label">Ground Spd</span><span id="g_spd" class="data-val">0.0
                    m/s</span></div>
        </div>

        <div class="section-title">Vehicle Config</div>
        <select id="v_type" style="width: 100%; margin-bottom: 10px; padding: 6px 10px;">
            <option value="vtol">QuadPlane (VTOL)</option>
            <option value="plane">Fixed Wing (Pusher)</option>
            <option value="twin">Twin Engine (Fixed Wing)</option>
            <option value="quad">Quadcopter</option>
        </select>

        <div class="data-card" style="margin-bottom: 20px; padding: 10px;">
            <div class="map-row" style="margin: 0;">
                <span>Model Scale</span>
                <input type="number" id="scale_input" value="1.0" step="0.1"
                    style="width: 60px; background: var(--panel-bg); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 4px; padding: 4px; font-size: 12px; font-family: inherit; outline: none; text-align: center;">
            </div>
        </div>

        <div class="data-card">
            <h3 style="margin: 0 0 10px 0; font-size: 14px;">Motor Mapping</h3>
            <div id="map-vtol">
                <div class="map-row">Motor 1 (FR) <select id="m_fr"></select></div>
                <div class="map-row">Motor 2 (BL) <select id="m_bl"></select></div>
                <div class="map-row">Motor 3 (FL) <select id="m_fl"></select></div>
                <div class="map-row">Motor 4 (BR) <select id="m_br"></select></div>
            </div>
            <div id="map-single" class="map-row">Cruise <select id="m_push"></select></div>
            <div id="map-twin" style="display: none;">
                <div class="map-row">Left Cruise <select id="m_twin_l"></select></div>
                <div class="map-row">Right Cruise <select id="m_twin_r"></select></div>
            </div>
        </div>

        <div class="section-title">Motors</div>
        <div class="motor-bar-container" id="motor-bars"></div>

        <div
            style="margin-top: 30px; text-align: center; font-size: 11px; color: var(--text-secondary); opacity: 0.6; font-weight: 600; letter-spacing: 1px;">
            Designed by RJ
        </div>

        <div class="btn-group">
            <button id="btn-follow" class="mode-btn btn-active">Follow</button>
            <button id="btn-free" class="mode-btn">Free</button>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.onclick = () => {
            const isDark = document.body.classList.contains('dark-mode');
            if (isDark) {
                document.body.classList.remove('dark-mode');
                themeToggle.innerText = '🌙';
            } else {
                document.body.classList.add('dark-mode');
                themeToggle.innerText = '☀️';
            }
            updateSceneTheme();
        };

        const scene = new THREE.Scene();
        let gridHelper;

        function updateSceneTheme() {
            const isDark = document.body.classList.contains('dark-mode');
            const bgHex = isDark ? 0x000000 : 0xf5f5f7;
            const grid1 = isDark ? 0x333336 : 0xd2d2d7;
            const grid2 = isDark ? 0x1c1c1e : 0xe5e5ea;

            scene.background = new THREE.Color(bgHex);
            scene.fog = new THREE.Fog(bgHex, 20, 200);

            if (gridHelper) scene.remove(gridHelper);
            gridHelper = new THREE.GridHelper(200, 200, grid1, grid2);
            gridHelper.position.y = -1;
            scene.add(gridHelper);
        }
        updateSceneTheme();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- Home Location Marker ---
        const homeRingGeo = new THREE.RingGeometry(0.8, 1.2, 32);
        const homeRingMat = new THREE.MeshBasicMaterial({ color: 0x22cc44, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
        const homeRing = new THREE.Mesh(homeRingGeo, homeRingMat);
        homeRing.rotation.x = -Math.PI / 2;
        homeRing.position.y = -0.99; // Hover just slightly above the grid
        scene.add(homeRing);

        const vtolGroup = new THREE.Group();
        vtolGroup.rotation.order = 'YXZ';
        scene.add(vtolGroup);

        const matBody = new THREE.MeshPhongMaterial({ color: 0x0071e3 });
        const matCarbon = new THREE.MeshPhongMaterial({ color: 0x333333 });

        const aeroGroup = new THREE.Group();
        vtolGroup.add(aeroGroup);

        // ==========================================
        // AIRCRAFT GEOMETRY CONFIGURATION
        // ==========================================
        const CONFIG = {
            modelFile: 'models/Endurance.glb',
            modelBaseScale: 1, // Use 0.001 if Fusion 360 exported in millimeters, 1.0 for meters
            modelRotation: { roll: 0, pitch: 0, yaw: -90 }, // Intuitive Aviation Degrees
            modelColor: 0xff5500, // Vibrant Orange

            cruisePropColor: 0x34c759, // Green
            cruisePropDia: 0.5,   // Diameter for Pusher and Twin propellers
            cruisePropBlades: 2,  // Number of blades for cruise propellers
            cruisePropDir: 0, // 0=CW, 1=CCW for main pusher
            pusherPos: { x: 0.5, y: 0, z: 0 }, // Tail pusher propeller

            twinMotorDia: 0.02,   // Diameter of twin engine nacelle
            twinMotorLength: 0.1, // Length of twin engine nacelle
            twinPosL: { x: -0.1, y: -0.4, z: 0 }, // Left twin engine (negative X is forward)
            twinPosR: { x: -0.1, y: 0.4, z: 0 },  // Right twin engine
            twinPropDir: [1, 0], // 0=CW, 1=CCW for [Left, Right] twin engines

            vtolPropColor: 0xff9500, // Orange
            vtolPropDia: 0.3, // Diameter of the quad propellers
            vtolPropBlades: 2, // Number of blades for VTOL propellers
            vtolPropDir: [1, 0, 0, 1], // 0=CW, 1=CCW for [FrontRight, FrontLeft, BackRight, BackLeft] (Default Quad-X)
            vtolBoomZ: -0.08, // Z-level of VTOL booms (negative = below wing)
            vtolBoomXOffset: -0.05, // X-offset for entire boom (shift forward/backward)
            vtolArmY: 0.3,    // Y-distance from centerline to boom
            vtolMotorX: 0.3,  // X-distance from Boom Center to front/back quad motor

            trackColor: 0xff00ff, // Color of the GPS trail line
            trackOrigin: { x: 0.5, y: 0, z: 0 } // Origin point of the GPS trail (e.g., GPS antenna)
        };
        // ==========================================

        // Helper to convert Aviation Coords to Three.js Web Coords
        function vspToThree(pos) {
            return new THREE.Vector3(pos.y, pos.z, pos.x); // X mappings flipped (-X Nose, +X Tail)
        }

        function createPropeller(diameter, colorHex, blades, axis = 'Z') {
            const propGroup = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.8 });
            const radius = diameter / 2;

            for (let i = 0; i < blades; i++) {
                const depth = axis === 'Z' ? 0.01 : 0.02;
                const height = axis === 'Z' ? 0.02 : 0.01;

                const bladeGeo = new THREE.BoxGeometry(radius, height, depth);
                bladeGeo.translate(radius / 2, 0, 0);

                const blade = new THREE.Mesh(bladeGeo, mat);
                if (axis === 'Z') blade.rotation.z = (i / blades) * Math.PI * 2;
                else if (axis === 'Y') blade.rotation.y = (i / blades) * Math.PI * 2;

                propGroup.add(blade);
            }
            return propGroup;
        }

        const trackPoint = new THREE.Object3D();
        trackPoint.position.copy(vspToThree(CONFIG.trackOrigin));
        vtolGroup.add(trackPoint);
        const currentTrackPos = new THREE.Vector3();

        const loader = new THREE.GLTFLoader();
        loader.load(CONFIG.modelFile, function (gltf) {
            const model = gltf.scene;
            
            // Map user-friendly aviation terms (Roll, Pitch, Yaw) to proper Three.js world axes
            model.rotation.set(
                (CONFIG.modelRotation.pitch || 0) * Math.PI / 180, // X-axis controls Pitch
                (CONFIG.modelRotation.yaw || 0) * Math.PI / 180,   // Y-axis controls Yaw
                (CONFIG.modelRotation.roll || 0) * Math.PI / 180,  // Z-axis controls Roll
                'YXZ' // Apply Yaw first, then Pitch, then Roll to prevent gimbal lock
            );
            
            model.scale.set(CONFIG.modelBaseScale, CONFIG.modelBaseScale, CONFIG.modelBaseScale);

            // Dynamic Model Scaling
            function updateModelScale() {
                let scaleVal = parseFloat(document.getElementById('scale_input').value);
                if (isNaN(scaleVal) || scaleVal <= 0) scaleVal = 1.0; // Fallback to original size if 0 or invalid
                vtolGroup.scale.set(scaleVal, scaleVal, scaleVal);
            }
            updateModelScale();
            document.getElementById('scale_input').addEventListener('input', updateModelScale);

            model.traverse(function (child) {
                if (child.isMesh) {
                    child.geometry.computeVertexNormals(); // Fixes black model!
                    child.material = new THREE.MeshStandardMaterial({
                        color: CONFIG.modelColor,
                        roughness: 0.4,
                        metalness: 0.3,
                        side: THREE.DoubleSide
                    });
                }
            });
            aeroGroup.add(model);
        }, undefined, function (error) {
            console.error('Error loading model:', error);
        });

        const pusherProp = createPropeller(CONFIG.cruisePropDia, CONFIG.cruisePropColor, CONFIG.cruisePropBlades, 'Z');
        const push3D = vspToThree(CONFIG.pusherPos);
        pusherProp.position.copy(push3D);
        vtolGroup.add(pusherProp);

        const quadGroup = new THREE.Group();
        vtolGroup.add(quadGroup);

        const twinGroup = new THREE.Group();
        vtolGroup.add(twinGroup);
        twinGroup.visible = false;

        const twinMotorL = new THREE.Mesh(new THREE.CylinderGeometry(CONFIG.twinMotorDia, CONFIG.twinMotorDia, CONFIG.twinMotorLength), matCarbon);
        twinMotorL.rotation.x = Math.PI / 2;
        const twinL3D = vspToThree(CONFIG.twinPosL);
        twinMotorL.position.copy(twinL3D);
        twinGroup.add(twinMotorL);
        const twinPropL = createPropeller(CONFIG.cruisePropDia, CONFIG.cruisePropColor, CONFIG.cruisePropBlades, 'Z');
        twinPropL.position.set(twinL3D.x, twinL3D.y, twinL3D.z - (CONFIG.twinMotorLength / 2));
        twinGroup.add(twinPropL);

        const twinMotorR = new THREE.Mesh(new THREE.CylinderGeometry(CONFIG.twinMotorDia, CONFIG.twinMotorDia, CONFIG.twinMotorLength), matCarbon);
        twinMotorR.rotation.x = Math.PI / 2;
        const twinR3D = vspToThree(CONFIG.twinPosR);
        twinMotorR.position.copy(twinR3D);
        twinGroup.add(twinMotorR);
        const twinPropR = createPropeller(CONFIG.cruisePropDia, CONFIG.cruisePropColor, CONFIG.cruisePropBlades, 'Z');
        twinPropR.position.set(twinR3D.x, twinR3D.y, twinR3D.z - (CONFIG.twinMotorLength / 2));
        twinGroup.add(twinPropR);

        const props = [];
        const xFront = CONFIG.vtolBoomXOffset + CONFIG.vtolMotorX;
        const xBack = CONFIG.vtolBoomXOffset - CONFIG.vtolMotorX;
        const armPositions = [
            { x: xFront, y: CONFIG.vtolArmY, z: CONFIG.vtolBoomZ }, // Front Right
            { x: xFront, y: -CONFIG.vtolArmY, z: CONFIG.vtolBoomZ }, // Front Left
            { x: xBack, y: CONFIG.vtolArmY, z: CONFIG.vtolBoomZ }, // Back Right
            { x: xBack, y: -CONFIG.vtolArmY, z: CONFIG.vtolBoomZ } // Back Left
        ];

        armPositions.forEach(pos => {
            const pos3D = vspToThree(pos);
            const boomLength = (CONFIG.vtolMotorX * 2) + 0.05; // Auto-scale boom length to motor spread
            const boom = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, boomLength), matCarbon);
            boom.rotation.x = Math.PI / 2;
            boom.position.set(pos3D.x, pos3D.y, CONFIG.vtolBoomXOffset); // Center of boom
            quadGroup.add(boom);

            const motor = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.06), matCarbon);
            motor.position.set(pos3D.x, pos3D.y + 0.03, pos3D.z);
            quadGroup.add(motor);

            const prop = createPropeller(CONFIG.vtolPropDia, CONFIG.vtolPropColor, CONFIG.vtolPropBlades, 'Y');
            prop.position.set(pos3D.x, pos3D.y + 0.06, pos3D.z);
            quadGroup.add(prop);
            props.push(prop);
        });

        document.getElementById('v_type').onchange = (e) => {
            const type = e.target.value;
            aeroGroup.visible = (type === 'vtol' || type === 'plane' || type === 'twin');
            quadGroup.visible = (type === 'vtol' || type === 'quad');
            pusherProp.visible = (type === 'vtol' || type === 'plane');
            twinGroup.visible = (type === 'twin');

            document.getElementById('map-vtol').style.display = (type === 'vtol') ? 'block' : 'none';
            document.getElementById('map-single').style.display = (type === 'vtol' || type === 'plane') ? 'flex' : 'none';
            document.getElementById('map-twin').style.display = (type === 'twin') ? 'block' : 'none';

            if (type === 'quad') {
                if (!quadGroup.hub) {
                    const hub = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.3), matCarbon);
                    hub.position.set(0, 0.05, -0.1);
                    quadGroup.add(hub);
                    quadGroup.hub = hub;
                }
                quadGroup.hub.visible = true;
            } else if (quadGroup.hub) {
                quadGroup.hub.visible = false;
            }
        };

        const selects = ['m_fr', 'm_bl', 'm_br', 'm_fl', 'm_push', 'm_twin_l', 'm_twin_r'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            for (let i = 1; i <= 8; i++) {
                const opt = document.createElement('option');
                opt.value = i - 1; opt.innerText = "CH" + i;
                el.appendChild(opt);
            }
        });
        document.getElementById('m_fr').value = 4;
        document.getElementById('m_bl').value = 5;
        document.getElementById('m_br').value = 6;
        document.getElementById('m_fl').value = 7;
        document.getElementById('m_push').value = 2;
        document.getElementById('m_twin_l').value = 2;
        document.getElementById('m_twin_r').value = 3;

        const maxTrailPoints = 2000;
        const trailPositions = new Float32Array(maxTrailPoints * 3);
        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        const trailMat = new THREE.LineBasicMaterial({ color: CONFIG.trackColor, linewidth: 2 });
        const trailLine = new THREE.Line(trailGeo, trailMat);
        trailLine.frustumCulled = false;
        scene.add(trailLine);
        let trailCount = 0;

        const motorBarsContainer = document.getElementById('motor-bars');
        const uiFills = [], uiPwms = [];
        for (let i = 0; i < 8; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'motor-bar-wrapper';
            const pwmVal = document.createElement('div'); pwmVal.className = 'pwm-label'; pwmVal.innerText = '1000';
            const bg = document.createElement('div'); bg.className = 'motor-bar-bg';
            const fill = document.createElement('div'); fill.className = 'motor-bar-fill'; fill.style.height = '0%';
            bg.appendChild(fill);
            const lbl = document.createElement('div'); lbl.innerText = i + 1; lbl.className = 'motor-label';
            wrapper.appendChild(pwmVal); wrapper.appendChild(bg); wrapper.appendChild(lbl);
            motorBarsContainer.appendChild(wrapper);
            uiFills.push(fill); uiPwms.push(pwmVal);
        }

        let cameraMode = 'follow', lastPlanePos = new THREE.Vector3(), lastTrailAddPos = new THREE.Vector3();
        document.getElementById('btn-follow').onclick = () => { cameraMode = 'follow'; document.getElementById('btn-follow').classList.add('btn-active'); document.getElementById('btn-free').classList.remove('btn-active'); };
        document.getElementById('btn-free').onclick = () => { cameraMode = 'free'; document.getElementById('btn-free').classList.add('btn-active'); document.getElementById('btn-follow').classList.remove('btn-active'); };
        const ws = new WebSocket(`ws://${window.location.hostname}:8766`);
        let servoSpeeds = [0, 0, 0, 0, 0, 0, 0, 0];
        let targetPos = new THREE.Vector3(), targetRot = new THREE.Euler(0, 0, 0, 'YXZ');
        let firstPos = false;

        ws.onopen = () => {
            document.getElementById('status').innerText = "Waiting for Vehicle...";
            document.getElementById('status').style.color = "var(--text-secondary)";
        };
        ws.onclose = () => {
            document.getElementById('status').innerText = "Offline";
            document.getElementById('status').style.color = "var(--danger)";
        };
        let vehicleConnected = false;
        ws.onmessage = (event) => {
            if (!vehicleConnected) {
                document.getElementById('status').innerText = "Connected";
                document.getElementById('status').style.color = "var(--success)";
                vehicleConnected = true;
            }
            const data = JSON.parse(event.data);
            if (data.type === 'HEARTBEAT') {
                if (data.mode) document.getElementById('f_mode').innerText = data.mode;
                if (data.firmware) document.getElementById('firmware').innerText = data.firmware;
            } else if (data.type === 'VFR_HUD') {
                document.getElementById('a_spd').innerText = data.airspeed.toFixed(1) + " m/s";
                document.getElementById('g_spd').innerText = data.groundspeed.toFixed(1) + " m/s";
            } else if (data.type === 'ATTITUDE') {
                targetRot.set(data.pitch, -data.yaw, -data.roll);
            } else if (data.type === 'LOCAL_POSITION_NED') {
                document.getElementById('alt').innerText = data.z.toFixed(1) + " m";
                targetPos.set(data.y, data.z, -data.x);
                if (!firstPos) {
                    vtolGroup.position.copy(targetPos);
                    vtolGroup.updateMatrixWorld(true);
                    trackPoint.getWorldPosition(currentTrackPos);
                    lastPlanePos.copy(targetPos);
                    lastTrailAddPos.copy(currentTrackPos);
                    firstPos = true;
                }
            }
            else if (data.type === 'SERVO_OUTPUT_RAW') {
                servoSpeeds = data.servos;
                for (let i = 0; i < 8; i++) {
                    let pwm = servoSpeeds[i]; uiPwms[i].innerText = pwm;
                    let percent = Math.max(0, Math.min(100, ((pwm - 1000) / 1000) * 100));
                    uiFills[i].style.height = percent + '%';
                    uiFills[i].style.background = (percent > 80) ? 'var(--danger)' : (percent > 10 ? 'var(--success)' : 'transparent');
                }
            }
        };

        function animate() {
            requestAnimationFrame(animate);

            // Heavy low-pass filter to erase 10Hz network stutter
            vtolGroup.position.lerp(targetPos, 0.02);
            let q = new THREE.Quaternion().setFromEuler(vtolGroup.rotation).slerp(new THREE.Quaternion().setFromEuler(targetRot), 0.02);
            vtolGroup.setRotationFromQuaternion(q);

            if (cameraMode === 'follow') {
                const offset = camera.position.clone().sub(controls.target);
                controls.target.copy(vtolGroup.position);
                camera.position.copy(controls.target).add(offset);
            }
            controls.update();
            lastPlanePos.copy(vtolGroup.position);

            trackPoint.getWorldPosition(currentTrackPos);

            if (currentTrackPos.distanceTo(lastTrailAddPos) > 0.5) {
                if (trailCount < maxTrailPoints - 1) { // Reserve 1 point for the dynamic tip
                    trailCount++; 
                } else {
                    trailPositions.copyWithin(0, 3);
                }
                lastTrailAddPos.copy(currentTrackPos);
            }

            // Always stretch the active tip of the trail to the current smooth plane position
            trailPositions[trailCount * 3] = currentTrackPos.x; 
            trailPositions[trailCount * 3 + 1] = currentTrackPos.y; 
            trailPositions[trailCount * 3 + 2] = currentTrackPos.z;
            trailGeo.setDrawRange(0, trailCount + 1);
            trailGeo.attributes.position.needsUpdate = true;

            let m_fr = parseInt(document.getElementById('m_fr').value), m_bl = parseInt(document.getElementById('m_bl').value),
                m_br = parseInt(document.getElementById('m_br').value), m_fl = parseInt(document.getElementById('m_fl').value),
                m_push = parseInt(document.getElementById('m_push').value), m_tl = parseInt(document.getElementById('m_twin_l').value),
                m_tr = parseInt(document.getElementById('m_twin_r').value);

            // Use 0.47 instead of 2.0 to avoid stroboscopic "freezing" effect
            // Apply directional multiplier (0 = CW = negative rotation, 1 = CCW = positive rotation)
            props[0].rotation.y += Math.max(0, (servoSpeeds[m_fr] - 1000) / 1000) * 0.47 * (CONFIG.vtolPropDir[0] === 0 ? -1 : 1);
            props[1].rotation.y += Math.max(0, (servoSpeeds[m_fl] - 1000) / 1000) * 0.47 * (CONFIG.vtolPropDir[1] === 0 ? -1 : 1);
            props[2].rotation.y += Math.max(0, (servoSpeeds[m_br] - 1000) / 1000) * 0.47 * (CONFIG.vtolPropDir[2] === 0 ? -1 : 1);
            props[3].rotation.y += Math.max(0, (servoSpeeds[m_bl] - 1000) / 1000) * 0.47 * (CONFIG.vtolPropDir[3] === 0 ? -1 : 1);
            pusherProp.rotation.z += Math.max(0, (servoSpeeds[m_push] - 1000) / 1000) * 0.47 * (CONFIG.cruisePropDir === 0 ? -1 : 1);
            twinPropL.rotation.z += Math.max(0, (servoSpeeds[m_tl] - 1000) / 1000) * 0.47 * (CONFIG.twinPropDir[0] === 0 ? -1 : 1);
            twinPropR.rotation.z += Math.max(0, (servoSpeeds[m_tr] - 1000) / 1000) * 0.47 * (CONFIG.twinPropDir[1] === 0 ? -1 : 1);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
